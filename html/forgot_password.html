<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPTS - Mot de passe oublié</title>
    <link rel="stylesheet" href="../css/index.css">

    <style>
        .forgot-page {
            min-height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #f8fbff 0%, #eef6ff 100%);
        }

        .forgot-card {
            width: 100%;
            max-width: 460px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 34px;
            box-shadow: 0 20px 45px rgba(18, 76, 145, 0.12);
        }

        .forgot-icon {
            width: 70px;
            height: 70px;
            border-radius: 22px;
            background: var(--primary-light);
            color: var(--primary);
            display: grid;
            place-items: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        .forgot-card h1 {
            text-align: center;
            color: var(--text);
            font-size: 30px;
            margin-bottom: 10px;
        }

        .forgot-card p {
            text-align: center;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 26px;
        }

        .forgot-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .forgot-field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .forgot-field span {
            font-size: 13px;
            font-weight: 800;
            color: var(--text);
        }

        .forgot-field input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 15px;
            font: inherit;
            outline: none;
            background: #fbfdff;
        }

        .forgot-field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
            background: white;
        }

        .forgot-btn {
            width: 100%;
            border-radius: 14px;
            padding: 15px;
            margin-top: 8px;
            background: var(--primary);
            color: white;
            font-weight: 900;
            box-shadow: 0 12px 24px rgba(11, 99, 206, 0.22);
        }

        .forgot-back {
            text-align: center;
            margin-top: 22px;
        }

        .forgot-back a {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }

        .forgot-back a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .forgot-card {
                padding: 26px 20px;
            }

            .forgot-card h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header id="header">
            <div class="brand">
                <a href="index.html" class="logo-mark" aria-hidden="true"></a>
            </div>

            <nav aria-label="Navigation principale">
                <a href="index.html">Accueil</a>
                <a href="recherche.html">Recherche</a>
                <a href="apropos.html">À propos</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="header-actions">
                <a href="login.html" class="btn-outline"
                    style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">
                    Se connecter
                </a>
                <a href="register.html" class="btn-primary"
                    style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">
                    S’inscrire
                </a>
            </div>

            <button class="mobile-toggle" type="button" id="mobileMenu" aria-label="Ouvrir le menu">☰</button>
        </header>

        <section class="forgot-page">
            <div class="forgot-card">
                <div class="forgot-icon">🔐</div>

                <h1>Mot de passe oublié</h1>
                <p>
                    Entrez votre email et votre téléphone pour vérifier votre identité,
                    puis choisissez un nouveau mot de passe.
                </p>

                <form class="forgot-form" id="forgotForm">
                    <label class="forgot-field">
                        <span>Adresse e-mail</span>
                        <input id="emailInput" type="email" placeholder="exemple@email.com" required>
                    </label>

                    <label class="forgot-field">
                        <span>Téléphone</span>
                        <input id="phoneInput" type="tel" placeholder="Ex : 0612345678" required>
                    </label>

                    <label class="forgot-field">
                        <span>Nouveau mot de passe</span>
                        <input id="newPasswordInput" type="password" placeholder="Nouveau mot de passe" required>
                    </label>

                    <label class="forgot-field">
                        <span>Confirmer le nouveau mot de passe</span>
                        <input id="confirmPasswordInput" type="password" placeholder="Confirmer le mot de passe" required>
                    </label>

                    <button class="forgot-btn" type="submit">
                        Réinitialiser le mot de passe
                    </button>
                </form>

                <div class="forgot-back">
                    <a href="login.html">Retour à la connexion</a>
                </div>
            </div>
        </section>
    </main>

    <div class="toast" id="toast">Message</div>

    <script>
        const header = document.getElementById("header");
        const mobileMenu = document.getElementById("mobileMenu");
        const form = document.getElementById("forgotForm");
        const toast = document.getElementById("toast");

        if (mobileMenu) {
            mobileMenu.addEventListener("click", () => {
                header.classList.toggle("menu-open");
                mobileMenu.textContent = header.classList.contains("menu-open") ? "×" : "☰";
            });
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const email = document.getElementById("emailInput").value.trim();
            const phone = document.getElementById("phoneInput").value.trim();
            const newPassword = document.getElementById("newPasswordInput").value;
            const confirmPassword = document.getElementById("confirmPasswordInput").value;

            if (newPassword !== confirmPassword) {
                showToast("Les mots de passe ne correspondent pas.");
                return;
            }

            if (newPassword.length < 8) {
                showToast("Le mot de passe doit contenir au moins 8 caractères.");
                return;
            }

            try {
                const response = await fetch("../php/forgotPassword.php", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: new URLSearchParams({
                        email: email,
                        phone: phone,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (!data.success) {
                    showToast(data.message || "Impossible de modifier le mot de passe.");
                    return;
                }

                showToast("Mot de passe modifié avec succès.");

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1000);

            } catch (error) {
                console.error(error);
                showToast("Erreur serveur.");
            }
        });
    </script>
</body>

</html>
