<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPTS - Résultats de recherche</title>
    <link rel="stylesheet" href="../css/index.css" />
    <!-- Leaflet CSS pour la carte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Styles spécifiques à la page de résultats */
        .search-header {
            padding: 24px 42px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        .results-layout {
            display: flex;
            min-height: 70vh;
        }

        .results-list {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .results-map {
            width: 45%;
            min-height: 500px;
            border-left: 1px solid var(--border);
        }

        .result-card {
            display: flex;
            gap: 18px;
            padding: 18px;
            margin-bottom: 16px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            align-items: center;
        }

        .result-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .result-avatar {
            width: 64px;
            height: 64px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
            font-size: 24px;
            flex-shrink: 0;
        }

        .result-info h3 {
            margin: 0 0 4px;
            color: var(--text);
        }

        .result-info p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .result-distance {
            margin-left: auto;
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
        }

        .no-results {
            text-align: center;
            padding: 48px;
            color: var(--muted);
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .view-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--white);
            font-weight: 600;
            cursor: pointer;
        }

        .view-btn.active {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 900px) {
            .results-layout {
                flex-direction: column;
            }

            .results-map {
                width: 100%;
                height: 300px;
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }

        /* Search panel compact sur recherche.html */
        .search-header .search-panel {
            display: flex !important;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px !important;

            width: auto !important;
            max-width: none !important;
            margin: 0 auto;
        }

        /* Tous les champs */
        .search-header .field {
            width: 240px !important;
            min-width: 240px;
        }

        /* Le champ nom est plus large */
        .search-header .field:first-child {
            width: 290px !important;
            min-width: 290px;
        }

        /* Les inputs remplissent bien leur box */
        .search-header .field input {
            width: 100%;
        }

        /* Bouton rechercher */
        .search-header .search-btn {
            width: auto;
            min-width: 150px;
            white-space: nowrap;
        }

        /* Mobile */
        @media (max-width: 760px) {
            .search-header .search-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .search-header .field,
            .search-header .field:first-child,
            .search-header .search-btn {
                width: 100% !important;
                min-width: 0;
            }
        }

        .directory-page {
            padding: 28px 36px 42px;
            background: #f8fbff;
        }

        .breadcrumb {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .directory-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
        }

        .directory-top h1 {
            font-size: 28px;
            color: var(--text);
            margin-bottom: 6px;
        }

        .directory-top p {
            color: var(--muted);
            font-size: 14px;
        }

        .sort-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        .sort-box select {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            background: white;
            color: var(--text);
            font-weight: 600;
        }

        .directory-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
            align-items: flex-start;
        }

        .filter-panel {
            background: white;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 12px 28px rgba(18, 76, 145, 0.08);
        }

        .filter-panel h3 {
            margin-bottom: 18px;
            color: var(--text);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .filter-group span {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 12px;
            outline: none;
            background: white;
            color: var(--text);
            font-weight: 600;
        }

        .filter-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .filter-check {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0 18px;
            font-size: 13px;
            color: var(--text);
        }

        .filter-check input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .filter-submit,
        .filter-reset {
            width: 100%;
            border-radius: 10px;
            padding: 12px 14px;
            font-weight: 800;
        }

        .filter-submit {
            background: var(--primary);
            color: white;
            margin-bottom: 10px;
        }

        .filter-reset {
            background: var(--primary-light);
            color: var(--primary);
        }

        .doctor-results {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-card {
            display: grid;
            grid-template-columns: 76px 1fr auto;
            gap: 18px;
            align-items: center;
            background: white;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 12px 28px rgba(18, 76, 145, 0.07);
            transition: 0.2s ease;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(18, 76, 145, 0.12);
        }

        .result-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 22px;
        }

        .result-info h3 {
            font-size: 17px;
            margin-bottom: 5px;
            color: var(--text);
        }

        .result-info .job {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .result-info .address,
        .result-info .description {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .result-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .status-badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
        }

        .status-badge.available {
            background: #e9fbe9;
            color: #15803d;
        }

        .status-badge.unavailable {
            background: #fff3d6;
            color: #b45309;
        }

        .favorite-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: white;
            color: var(--muted);
        }

        .details-btn {
            text-decoration: none;
            border: 1px solid #abc8ed;
            color: var(--primary);
            background: white;
            padding: 8px 12px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 800;
        }

        .no-results {
            text-align: center;
            color: var(--muted);
            padding: 60px 20px;
        }

        @media (max-width: 900px) {
            .directory-layout {
                grid-template-columns: 1fr;
            }

            .directory-top {
                flex-direction: column;
            }

            .result-card {
                grid-template-columns: 64px 1fr;
            }

            .result-actions {
                grid-column: 1 / -1;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <!-- En-tête (identique aux autres pages) -->
        <header id="header">
            <div class="header-left">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Ouvrir le menu latéral">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="brand">
                    <a href="index.html" class="logo-mark" aria-hidden="true"></a>
                </div>
            </div>

            <nav aria-label="Navigation principale">
                <a href="index.html">Accueil</a>
                <a href="recherche.html" class="active">Recherche</a>
                <a href="apropos.html">À propos</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="header-actions">
                <a href="login.html" class="btn-outline">Se connecter</a>
                <a href="register.html" class="btn-primary">S’inscrire</a>
            </div>

            <button class="mobile-toggle" type="button" id="mobileMenu" aria-label="Ouvrir le menu">☰</button>
        </header>

        <section class="directory-page">
            <div class="breadcrumb">Accueil &gt; Recherche</div>

            <div class="directory-top">
                <div>
                    <h1>Résultats de recherche</h1>
                    <p id="resultsCount">Chargement des professionnels...</p>
                </div>

                <label class="sort-box">
                    <span>Trier par :</span>
                    <select id="sortSelect">
                        <option value="proximity">Proximité</option>
                        <option value="name">Nom</option>
                        <option value="availability">Disponibilité</option>
                    </select>
                </label>
            </div>

            <div class="directory-layout">
                <aside class="filter-panel">
                    <h3>Filtres</h3>

                    <form id="searchForm">
                        <label class="filter-group">
                            <span>Nom du professionnel</span>
                            <input id="nameInput" type="text" placeholder="Nom du professionnel">
                        </label>

                        <label class="filter-group">
                            <span>Spécialité / Compétence</span>
                            <div class="custom-select">
                                <input id="skillInput" type="text" placeholder="Toutes les compétences"
                                    autocomplete="off">
                                <ul id="skillsList" class="dropdown-list"></ul>
                            </div>
                        </label>

                        <label class="filter-group">
                            <span>Pathologie</span>
                            <div class="custom-select">
                                <input id="pathologyInput" type="text" placeholder="Toutes les pathologies"
                                    autocomplete="off">
                                <ul id="pathologyList" class="dropdown-list"></ul>
                            </div>
                        </label>

                        <label class="filter-group">
                            <span>Localisation</span>
                            <input id="locationInput" type="text" placeholder="Ville ou code postal">
                        </label>

                        <label class="filter-check">
                            <input id="availableOnly" type="checkbox">
                            <span>Disponibles uniquement</span>
                        </label>

                        <button class="filter-submit" type="submit">Rechercher</button>
                        <button class="filter-reset" type="button" id="resetFilters">Réinitialiser les filtres</button>
                    </form>
                </aside>

                <section class="doctor-results" id="resultsList">
                    <p class="no-results">Chargement des professionnels...</p>
                </section>
            </div>
        </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast">Recherche lancée</div>

    <!-- Sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="app-sidebar" id="appSidebar">
        <!-- ... (identique aux autres pages, repris de index.html) ... -->
        <div class="sidebar-header">
            <div class="brand">
                <a href="index.html" class="logo-mark" aria-hidden="true" style="width: 120px; height: 30px;"></a>
            </div>
            <button class="close-sidebar" id="closeSidebar">&times;</button>
        </div>
        <a href="../php/monprofil.php" class="nav-item">Mon profil</a>
        <a href="#" class="nav-item">Mes favoris</a>
        <a href="#" class="nav-item">Mes rendez-vous</a>
        <a href="login.html" class="nav-item logout">Déconnexion</a>
    </aside>

    <!-- Scripts -->
    <script src="../js/script.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const locationInput = document.getElementById("locationInput");
        const availableOnly = document.getElementById("availableOnly");
        // ---- Gestion du menu mobile & sidebar (identique aux autres pages) ----
        const header = document.getElementById("header");
        const mobileMenu = document.getElementById("mobileMenu");
        mobileMenu?.addEventListener("click", () => {
            header.classList.toggle("menu-open");
            mobileMenu.textContent = header.classList.contains("menu-open") ? "×" : "☰";
        });

        const sidebarToggle = document.getElementById("sidebarToggle");
        const appSidebar = document.getElementById("appSidebar");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        const closeSidebarBtn = document.getElementById("closeSidebar");

        function toggleSidebar() {
            appSidebar.classList.toggle("open");
            sidebarOverlay.classList.toggle("open");
        }
        sidebarToggle?.addEventListener("click", toggleSidebar);
        closeSidebarBtn?.addEventListener("click", toggleSidebar);
        sidebarOverlay?.addEventListener("click", toggleSidebar);

        // ---- Gestion de la vue (liste / carte) ----
        const resultsList = document.getElementById("resultsList");

        // ---- Recherche (AJAX) ----
        const searchForm = document.getElementById("searchForm");
        const nameInput = document.getElementById("nameInput");
        const skillInput = document.getElementById("skillInput");
        const pathologyInput = document.getElementById("pathologyInput");

        // Pré-remplissage des champs depuis l'URL (si on vient de l'accueil)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('name')) nameInput.value = urlParams.get('name');
        if (urlParams.get('skill')) skillInput.value = urlParams.get('skill');
        if (urlParams.get('pathology')) pathologyInput.value = urlParams.get('pathology');
        performSearch();
        searchForm.addEventListener("submit", function (e) {
            e.preventDefault();
            performSearch();
        });

        const resetFilters = document.getElementById("resetFilters");

        resetFilters.addEventListener("click", () => {
            nameInput.value = "";
            skillInput.value = "";
            pathologyInput.value = "";
            locationInput.value = "";
            availableOnly.checked = false;

            document.getElementById("skillsList").style.display = "none";
            document.getElementById("pathologyList").style.display = "none";

            performSearch();
        });

        async function performSearch() {
            const name = nameInput.value.trim();
            const skill = skillInput.value.trim();
            const pathology = pathologyInput.value.trim();

            try {
                const location = locationInput.value.trim();
                const available = availableOnly.checked ? "1" : "";

                let url =
                    `../php/recherche.php?name=${encodeURIComponent(name)}` +
                    `&skill=${encodeURIComponent(skill)}` +
                    `&pathology=${encodeURIComponent(pathology)}` +
                    `&location=${encodeURIComponent(location)}` +
                    `&available=${encodeURIComponent(available)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Erreur réseau");
                const data = await response.json();

                displayResults(data);
            } catch (error) {
                console.error(error);
                document.getElementById("resultsList").innerHTML = `<p class="no-results">Erreur lors de la recherche. Veuillez réessayer.</p>`;
            }
        }

        function displayResults(professionals) {
            resultsList.innerHTML = "";

            const resultsCount = document.getElementById("resultsCount");

            if (!professionals || professionals.length === 0) {
                resultsCount.textContent = "0 professionnel trouvé";
                resultsList.innerHTML = `<p class="no-results">Aucun professionnel trouvé.</p>`;
                return;
            }

            resultsCount.textContent = `${professionals.length} professionnel(s) trouvé(s)`;

            professionals.forEach(pro => {
                const displayName =
                    pro.name ||
                    `${pro.first_name || ""} ${pro.last_name || ""}`.trim() ||
                    "Professionnel de santé";

                const initials =
                    pro.initiales ||
                    displayName
                        .split(" ")
                        .map(word => word.charAt(0))
                        .join("")
                        .substring(0, 2)
                        .toUpperCase();

                const isAvailable = pro.is_available == 1 || pro.is_available === undefined;

                const card = document.createElement("article");
                card.className = "result-card";

                card.innerHTML = `
            <div class="result-avatar">${initials}</div>

            <div class="result-info">
                <h3>${displayName}</h3>
                <p class="job">${pro.job_title || "Professionnel de santé"}</p>
                <p class="address">
                    ${pro.address || ""} ${pro.postal_code || ""} ${pro.city || ""}
                </p>
                <p class="description">${pro.description || ""}</p>
            </div>

            <div class="result-actions">
                <span class="status-badge ${isAvailable ? "available" : "unavailable"}">
                    ${isAvailable ? "Disponible" : "Bientôt disponible"}
                </span>

                <button class="favorite-btn" type="button">♡</button>

                <a class="details-btn" href="fiche.html?id=${pro.id}">
                    Voir la fiche
                </a>
            </div>
        `;

                resultsList.appendChild(card);
            });
        }
    </script>
</body>

</html>
